# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI con Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Forzar Node.js 24 en todas las GitHub Actions para evitar warnings de deprecación de Node20.
# GitHub migrará a Node24 por defecto en junio 2026. Esta env adelanta esa migración.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: build-and-test (${{ matrix.browser }})

    # Matrix de browsers: ejecuta un job separado para CHROME y FIREFOX en paralelo
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: CHROME
            browser_name: Google Chrome
          - browser: FIREFOX
            browser_name: Mozilla Firefox

    steps:
    # ─────────────────────────────────────────────────────────
    # 1. Checkout del código fuente
    # ─────────────────────────────────────────────────────────
    - name: Checkout del repositorio
      uses: actions/checkout@v4.2.2

    # ─────────────────────────────────────────────────────────
    # 2. Configuración de JDK 11 (Basado en pom.xml)
    # ─────────────────────────────────────────────────────────
    - name: Configurar JDK 11
      uses: actions/setup-java@v4.7.0
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    # ─────────────────────────────────────────────────────────
    # 3. Cache de dependencias de Maven
    # ─────────────────────────────────────────────────────────
    - name: Cache de paquetes de Maven
      uses: actions/cache@v4.2.3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    # ─────────────────────────────────────────────────────────
    # 4. Cache del WebDriver (ChromeDriver / GeckoDriver)
    #    Evita descargas repetidas en cada ejecución del workflow
    # ─────────────────────────────────────────────────────────
    - name: Cache de WebDrivers (WebDriverManager)
      uses: actions/cache@v4.2.3
      with:
        path: ~/.cache/selenium
        key: ${{ runner.os }}-webdrivers-${{ matrix.browser }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-webdrivers-${{ matrix.browser }}

    # ─────────────────────────────────────────────────────────
    # 5. Instalación del Navegador y verificación del WebDriver
    #    CHROME: preinstalado en ubuntu-latest
    #            → ChromeDriver se descarga via WebDriverManager (Java)
    #    FIREFOX: se instala via apt-get
    #             → GeckoDriver se instala desde release oficial de Mozilla
    # ─────────────────────────────────────────────────────────
    - name: Instalar ${{ matrix.browser_name }} y WebDriver
      run: |
        if [ "${{ matrix.browser }}" == "CHROME" ]; then
          echo "=== Verificando Google Chrome ==="
          google-chrome --version
          echo "ChromeDriver será descargado automáticamente por WebDriverManager"

        elif [ "${{ matrix.browser }}" == "FIREFOX" ]; then
          echo "=== Instalando Mozilla Firefox ==="
          sudo apt-get update -qq
          sudo apt-get install -y firefox

          echo "=== Instalando GeckoDriver (WebDriver para Firefox) ==="
          GECKO_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest \
            | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          echo "Instalando GeckoDriver v${GECKO_VERSION}"
          wget -q "https://github.com/mozilla/geckodriver/releases/download/v${GECKO_VERSION}/geckodriver-v${GECKO_VERSION}-linux64.tar.gz"
          tar -xzf "geckodriver-v${GECKO_VERSION}-linux64.tar.gz"
          sudo mv geckodriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/geckodriver

          echo "=== Verificación final ==="
          firefox --version
          geckodriver --version
        fi

    # ─────────────────────────────────────────────────────────
    # 6. Ejecución de Pruebas con Selenium + Cucumber + TestNG
    #    Flags de entorno CI:
    #    -DHEADLESS=true  → modo headless obligatorio en runners sin pantalla
    #    -DVIDEO=false    → sin grabación (Robot requiere pantalla física)
    #    -DBROWSER        → browser de la matrix actual
    #    -e               → muestra errores detallados
    #    -Dwdm.cachePath  → apunta al directorio cacheado del WebDriverManager
    # ─────────────────────────────────────────────────────────
    - name: Ejecutar Pruebas Headless (${{ matrix.browser_name }})
      run: |
        mvn clean test -e \
          -DHEADLESS=true \
          -DVIDEO=false \
          -DBROWSER=${{ matrix.browser }} \
          -DENV=qa \
          -Dwdm.cachePath="${HOME}/.cache/selenium"

    # ─────────────────────────────────────────────────────────
    # 7. Subir reporte Surefire para diagnóstico de fallos
    # ─────────────────────────────────────────────────────────
    - name: Subir reportes Surefire (${{ matrix.browser_name }})
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: surefire-reports-${{ matrix.browser }}
        path: target/surefire-reports
        retention-days: 7

    # ─────────────────────────────────────────────────────────
    # 8. Subir resultados de Allure por browser
    # ─────────────────────────────────────────────────────────
    - name: Subir resultados de Allure (${{ matrix.browser_name }})
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: allure-results-${{ matrix.browser }}
        path: target/allure-results
        retention-days: 7

    # ─────────────────────────────────────────────────────────
    # 9. Generar Reporte Allure (siempre se ejecuta)
    # ─────────────────────────────────────────────────────────
    - name: Generar Reporte Allure (${{ matrix.browser_name }})
      if: always()
      run: mvn allure:report
