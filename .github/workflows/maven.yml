# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI con Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Forzar Node.js 24 en todas las GitHub Actions para evitar warnings de deprecación de Node20.
# GitHub migrará a Node24 por defecto en junio 2026. Esta env adelanta esa migración.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: build-and-test (${{ matrix.browser }})

    # Matrix de browsers: ejecuta un job separado para CHROME y FIREFOX en paralelo
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- CHROME ---
          - browser: CHROME
            browser_name: Google Chrome

          # --- FIREFOX ---
          - browser: FIREFOX
            browser_name: Mozilla Firefox

    steps:
    # ─────────────────────────────────────────────────────────
    # 1. Checkout del código fuente
    # ─────────────────────────────────────────────────────────
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # ─────────────────────────────────────────────────────────
    # 2. Configuración de JDK 11 (Basado en pom.xml)
    # ─────────────────────────────────────────────────────────
    - name: Configurar JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    # ─────────────────────────────────────────────────────────
    # 3. Instalación de Navegador y WebDriver
    #    - CHROME: ya viene preinstalado en ubuntu-latest
    #              WebDriverManager descarga chromedriver automáticamente
    #    - FIREFOX: se instala via apt, GeckoDriver se instala manualmente
    # ─────────────────────────────────────────────────────────
    - name: Instalar ${{ matrix.browser_name }} y WebDriver
      run: |
        if [ "${{ matrix.browser }}" == "CHROME" ]; then
          echo "=== Verificando Google Chrome ==="
          google-chrome --version
          # ChromeDriver es descargado automáticamente por WebDriverManager en tiempo de ejecución

        elif [ "${{ matrix.browser }}" == "FIREFOX" ]; then
          echo "=== Instalando Mozilla Firefox ==="
          sudo apt-get update -qq
          sudo apt-get install -y firefox

          echo "=== Instalando GeckoDriver (WebDriver para Firefox) ==="
          GECKO_VERSION=$(curl -s https://api.github.com/repos/mozilla/geckodriver/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          echo "Versión de GeckoDriver a instalar: $GECKO_VERSION"
          wget -q "https://github.com/mozilla/geckodriver/releases/download/v${GECKO_VERSION}/geckodriver-v${GECKO_VERSION}-linux64.tar.gz"
          tar -xzf "geckodriver-v${GECKO_VERSION}-linux64.tar.gz"
          sudo mv geckodriver /usr/local/bin/
          sudo chmod +x /usr/local/bin/geckodriver

          echo "=== Verificación final ==="
          firefox --version
          geckodriver --version
        fi

    # ─────────────────────────────────────────────────────────
    # 4. Cache de dependencias de Maven
    # ─────────────────────────────────────────────────────────
    - name: Cache de paquetes de Maven
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    # ─────────────────────────────────────────────────────────
    # 5. Ejecución de Pruebas con Selenium + Cucumber + TestNG
    #    Flags CI obligatorios:
    #    -DHEADLESS=true  → modo sin pantalla (obligatorio en CI)
    #    -DVIDEO=false    → desactivar grabación (Robot requiere pantalla física)
    #    -DBROWSER        → browser de la matrix actual
    # ─────────────────────────────────────────────────────────
    - name: Ejecutar Pruebas Headless (${{ matrix.browser_name }})
      run: |
        mvn clean test \
          -DHEADLESS=true \
          -DVIDEO=false \
          -DBROWSER=${{ matrix.browser }} \
          -DENV=qa

    # ─────────────────────────────────────────────────────────
    # 6. Subir resultados de Allure por browser
    # ─────────────────────────────────────────────────────────
    - name: Subir resultados de Allure (${{ matrix.browser_name }})
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.browser }}
        path: target/allure-results
        retention-days: 7

    # ─────────────────────────────────────────────────────────
    # 7. Generar Reporte Allure (siempre se ejecuta)
    # ─────────────────────────────────────────────────────────
    - name: Generar Reporte Allure (${{ matrix.browser_name }})
      if: always()
      run: mvn allure:report
