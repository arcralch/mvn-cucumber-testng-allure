# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI con Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [CHROME, FIREFOX]

    steps:
    # 1. Checkout
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    # 2. Java
    - name: Configurar JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    # 3. Instalar Chrome + Firefox + Drivers
    - name: Instalar navegadores y drivers
      run: |
        # Chrome (ya viene instalado)
        google-chrome --version

        # Firefox
        sudo apt-get update
        sudo apt-get install -y firefox

        # GeckoDriver (para Firefox)
        wget https://github.com/mozilla/geckodriver/releases/latest/download/geckodriver-linux64.tar.gz
        tar -xvzf geckodriver-linux64.tar.gz
        sudo mv geckodriver /usr/local/bin/

        geckodriver --version

    # 4. Cache Maven
    - name: Cache de paquetes de Maven
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    # 5. Ejecutar pruebas (dinámico por navegador)
    - name: Ejecutar Pruebas con Maven (Headless)
      run: |
        mvn clean test \
          -DHEADLESS=true \
          -DVIDEO=false \
          -DBROWSER=${{ matrix.browser }} \
          -DENV=qa

    # 6. Allure results
    - name: Subir resultados de Allure
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results-${{ matrix.browser }}
        path: target/allure-results
        retention-days: 7

    # 7. Reporte Allure
    - name: Generar Reporte Allure (Opcional)
      if: always()
      run: mvn allure:report
