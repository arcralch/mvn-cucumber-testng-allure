# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome, firefox]   # 🔥 ejecuta ambos

    steps:
    # Checkout
    - uses: actions/checkout@v4

    # Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # (Opcional pero recomendado) instalar Firefox
    - name: Install Firefox
      run: sudo apt-get update && sudo apt-get install -y firefox

    # Ejecutar pruebas pasando el browser
    - name: Run tests
      run: mvn clean test -Dbrowser=${{ matrix.browser }}

    # Guardar reportes
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.browser }}
        path: |
          target/surefire-reports
          target/failsafe-reports

    # Dependencias
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
