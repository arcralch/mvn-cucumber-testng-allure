# Workflow de CI usando Docker autosuficiente
# Ejecuta TODAS las pruebas dentro del contenedor Docker.
# La imagen ya incluye: Java 11, Maven, Chrome, Firefox y GeckoDriver.

name: Selenium Docker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el repo (para obtener el Dockerfile)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Construir imagen Docker
    - name: Build Docker image
      run: |
        docker build -t selenium-tests .

    # 3. Ejecutar pruebas dentro del contenedor
    - name: Run tests
      run: |
        docker run --rm selenium-tests

    # 4. Guardar resultados Allure
    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-results
        path: /home/runner/work/**/target/allure-results

    # 5. Guardar reportes TestNG (opcional)
    - name: Upload TestNG reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: testng-reports
        path: /home/runner/work/**/target/surefire-reports