# Workflow de CI usando Docker autosuficiente
# Ejecuta TODAS las pruebas dentro del contenedor Docker.
# La imagen ya incluye: Java 11, Maven, Chrome, Firefox y GeckoDriver.

name: Selenium Docker CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Build Docker image
    - name: Build Docker image
      run: docker build -t selenium-tests .

    # 3. Ejecutar pruebas
    - name: Run tests
      run: |
        docker run --rm \
          -v ${{ github.workspace }}/allure-results:/app/target/allure-results \
          selenium-tests mvn clean test

    # 4. Generar reporte Allure
    - name: Generate Allure report
      run: |
        docker run --rm \
          -v ${{ github.workspace }}/allure-results:/app/target/allure-results \
          -v ${{ github.workspace }}/allure-report:/app/target/site/allure-maven-plugin \
          selenium-tests mvn allure:report

    # 5. Comprimir reporte
    - name: Compress report
      run: |
        zip -r allure-report.zip allure-report

    # 6. Subir ZIP
    - name: Upload Allure ZIP
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report.zip